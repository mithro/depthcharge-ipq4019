# Bind dnsmasq exclusively to one Pi USB-eth NIC, leaves eth0 (mgmt) alone.
# Replace IFACE with the desired NIC before launching.
interface=IFACE
bind-interfaces
no-hosts
no-resolv
dhcp-range=10.42.1.50,10.42.1.150,5m
dhcp-boot=openwrt-gale.itb
enable-tftp
tftp-root=/srv/tftp
log-dhcp
log-facility=/tmp/dnsmasq-gwifi.log
pid-file=/tmp/dnsmasq-gwifi.pid
dhcp-leasefile=/tmp/dnsmasq-gwifi.leases
user=root
